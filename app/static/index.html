</head>
<body>

<h2>AI Coding Assistant</h2>

<div id="chat"></div>

<div id="input-area">
    <input id="input" type="text" placeholder="Ask something about coding..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
let history = [];

async function sendMessage() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    const message = input.value.trim();
    if (!message) return;

    // Add user message
    const userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerHTML = `<div class="bubble">${message}</div>`;
    chat.appendChild(userDiv);

    input.value = "";

// Send request
const response = await fetch("http://127.0.0.1:8000/chat", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        session_id: "1",
        message: message
    })
});

const data = await response.json();
console.log("SERVER RESPONSE:", data);

// Add AI message (render Markdown)
const aiDiv = document.createElement("div");
aiDiv.className = "message ai";

const html = marked.parse(data.response);

aiDiv.innerHTML = `<div class="bubble">${html}</div>`;
chat.appendChild(aiDiv);

    // Highlight code
    document.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
    });

    // Update history (basic version)
    history.push(message);

    // Scroll down
    chat.scrollTop = chat.scrollHeight;
}

// Enter to send
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
